<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>404 | Page Not Found</title>

<meta name="robots" content="noindex">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    font-family:Inter,sans-serif;

    display:flex;

    justify-content:center;

    align-items:center;

    min-height:100vh;

    background:#f8fafc;

    color:#0f172a;

    text-align:center;

    padding:2rem;

}

.container{

    max-width:650px;

}

h1{

    font-size:7rem;

    color:#2563eb;

    margin-bottom:.5rem;

}

h2{

    font-size:2rem;

    margin-bottom:1rem;

}

p{

    color:#64748b;

    line-height:1.8;

    margin-bottom:2rem;

}

a{

    display:inline-block;

    text-decoration:none;

    padding:1rem 2rem;

    border-radius:999px;

    background:#2563eb;

    color:white;

    font-weight:600;

    transition:.3s;

}

a:hover{

    transform:translateY(-3px);

}

</style>

</head>

<body>

<div class="container">

<h1>404</h1>

<h2>Oops! Page Not Found</h2>

<p>
The page you're looking for doesn't exist or may have been moved.
</p>

<a href="/portfolio">
Return to Homepage
</a>

<a href="index.html">Home</a>

<a href="index.html#contact">
Contact Me
</a>

</div>

</body>

</html>
